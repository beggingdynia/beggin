<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beggin Gdynia - Omlety</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #500613; /* Bordowe tło pasujące do grafik */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .gallery-container {
            max-width: 800px;
            width: 100%;
            padding: 1rem;
            box-sizing: border-box;
        }
        .gallery-image {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <!-- Pierwsze zdjęcie (z poprzedniej wiadomości) -->
        <img src="plakat1.jpg" alt="Beggin Gdynia Plakat 1" class="gallery-image">

        <!-- Drugie zdjęcie (porównanie z obecnej wiadomości) -->
        <img src="plakat2.jpg" alt="Beggin Gdynia Plakat 2" class="gallery-image">
    </div>

</body>
</html>
